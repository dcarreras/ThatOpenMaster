<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 66" role="img" aria-label="Valtria by Clauger">
  <!-- White background with rounded corners -->
  <rect width="210" height="66" rx="8" fill="#ffffff"/>
  <!-- "by clauger" subtitle -->
  <text
    x="88"
    y="20"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10.5"
    fill="#666666"
    letter-spacing="0.4">by clauger</text>
  <!-- Main wordmark: "val" near-black + "tria" Valtria blue -->
  <text
    x="8"
    y="60"
    font-family="'Arial Black', Impact, Haettenschweiler, sans-serif"
    font-size="44"
    font-weight="900">
    <tspan fill="#111111">val</tspan><tspan fill="#0872b0">tria</tspan>
  </text>
</svg>
